    <!--strike Through-->

    <!--Pre Tag-->
    <pre>
        Hey         
                    how are 
               you!     
    </pre><hr>
    <!-- Small tag-->

    <hr>

    co<sub>2</sub>+ho<sub>2</sub><hr>
    (a+b)<sup>2</sup>=a<sup>2</sup>+b<sup>2</sup>+2ab
